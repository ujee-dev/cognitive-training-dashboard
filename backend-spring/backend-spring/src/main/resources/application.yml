spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cognitive_db
    username: admin
    password: admin789
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update  # 테이블이 없으면 생성, 있으면 변경된 부분만 반영
      # create: 실행 시점에 기존 테이블 삭제 후 새로 생성 (데이터 날아감)
      # create-drop: 실행 시 생성, 종료 시 삭제 (테스트용)
      # update: 엔티티와 DB 스키마를 비교해서 변경사항만 반영 (데이터 유지)
      # validate: 엔티티와 테이블이 일치하는지만 검사 (운영 환경 추천)
      # none: 아무것도 하지 않음
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 1MB # 단일 파일 제한
      max-request-size: 1MB # 전체 요청 제한
      location: ${java.io.tmpdir} # 실제 저장 폴더

jwt: # 비밀키(secret)는 최소 32자 이상의 임의 문자열을 사용
  secret: onetwohanadoolover123-123onetwohanadoolover
  expiration: 86400000 # 만료시간; 24시간 (단위: ms)

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# 사용자 정의 경로 설정
file:
  upload-dir: ./uploads/profiles
